name: Deploy docs site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment, but let in-progress runs finish so a
# live deploy is never interrupted half-way.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Quality gate + build. Runs on every push and PR; only `deploy` is main-gated,
  # so PRs get full validation (types + lint/fmt + build) without publishing.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      # Two packages: the root library and the docs/ Astro app.
      - run: npm ci
      - run: npm --prefix docs ci
      # Library quality gate (typecheck + lint/fmt).
      - run: npm run types
      - run: npm run check
      # Build the docs+demo site. `base` (/matrix-rain-webgpu/) is set in
      # astro.config.mjs — astro build has no --base flag.
      - run: npm --prefix docs run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
